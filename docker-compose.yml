volumes:
  kong_data:

networks:
  kong-net:
    driver: bridge

services:
  arrival:
    build: 
      context: ./arrival-alert-composite
      dockerfile: arrival.Dockerfile
    networks:
      - kong-net
    ports:
      - "${PORT:-6767}:5000"
    env_file:
      - ./arrival-alert-composite/.env
    environment:
      - TZ=Asia/Singapore
    # uncomment for development with hot reload
    # volumes:
    #   - "./arrival-alert-composite:/app" 
    # environment:
    #   - FLASK_ENV=development
    # networks:     # uncomment for gantry ui
    #   - drivethrough-net  
    restart: always

  merchant:
    build: 
      context: ./merchant-management-composite
      dockerfile: merchant.Dockerfile
    ports:
      - "6768:5000"
    networks:
      - kong-net
    env_file:
      - ./merchant-management-composite/.env
    environment:
      - TZ=Asia/Singapore
    # volumes:
    #   - "./merchant-management-composite:/app" # DELETE ONCE DONE WITH DEVELOPMENT
    # environment:
    #   - FLASK_ENV=development
    restart: always

  consumer:
    build: 
      context: ./notification-rabbitmq-wrapper/consumer
      dockerfile: consumer.Dockerfile
    container_name: rabbit_consumer
    env_file:
      - ./notification-rabbitmq-wrapper/.env
    restart: always

  publisher:
    build: 
      context: ./notification-rabbitmq-wrapper/publisher
      dockerfile: publisher.Dockerfile
    container_name: rabbit_publisher
    ports:
      - "6700:3000"
    restart: always
    env_file:
      - ./notification-rabbitmq-wrapper/.env

  kong-database:
    image: postgres:17.4
    restart: always
    container_name: kong-database
    env_file:
      - ./kong/.env
    networks:
      - kong-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong/kong-gateway:3.9
    restart: on-failure
    command: kong migrations bootstrap
    env_file:
      - ./kong/.env
    networks:
      - kong-net
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
    depends_on:
      - kong-database

  kong:
    image: kong/kong-gateway:3.9
    restart: always
    container_name: kong
    env_file:
      - ./kong/.env
    networks:
      - kong-net
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: ${KONG_PG_USER}
      KONG_PG_PASSWORD: ${KONG_PG_PASSWORD}
      KONG_PG_DATABASE: ${KONG_PG_DATABASE}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_ADMIN_GUI_URL: http://${VM_HOST}:8002
    ports:
      - "8000:8000" # Takes incoming HTTP traffic from Consumers, and forwards it to upstream Services.
      - "8001:8001" # Admin API. Listens for calls from the command line over HTTP.
      - "8002:8002" # Kong Manager (GUI). Listens for HTTP traffic.
    depends_on:
      - kong-database
      - kong-migrations